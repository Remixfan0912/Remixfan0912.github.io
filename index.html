<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloudy Adventure</title>
  <meta name="description" content="中山資工營pygame專案 《Cloudy Adventure》教學筆記 — 角色架構、程式碼逐步解說，以深色主題程式員風格呈現。" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <!-- Prism.js Tomorrow Night theme -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/line-numbers/prism-line-numbers.min.css" />

  <!-- Marked.js for parsing markdown client-side -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    /* ─── CSS Reset & Root ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0E1117;
      --sidebar-bg:  rgba(22, 26, 34, 0.75);
      --panel-bg:    rgba(33, 38, 45, 0.40);
      --panel-border:rgba(240, 246, 252, 0.10);
      --accent:      #58A6FF;
      --accent-dim:  rgba(88, 166, 255, 0.15);
      --text:        #C9D1D9;
      --muted:       #8B949E;
      --danger:      #FF7B72;
      --success:     #56D364;
      --warning:     #E3B341;
      --nav-h:       72px;
      --sidebar-w:   240px;
      --radius:      12px;
      --mono:        'JetBrains Mono', 'Fira Code', monospace;
      --sans:        'Noto Sans TC', 'Segoe UI', sans-serif;
      --ease:        cubic-bezier(0.4, 0, 0.2, 1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--sans);
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── Scrollbar ─────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(139,148,158,0.35); border-radius: 3px; transition: background 0.3s var(--ease); }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    /* ─── Background ─────────────────────────────────────────── */
    #bg-wrap {
      position: fixed; inset: 0; z-index: 0;
      background-image: url('backgroud.png');
      background-size: cover;
      background-position: center bottom;
      background-repeat: no-repeat;
    }
    #bg-wrap::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(
        180deg,
        rgba(14,17,23,0.92) 0%,
        rgba(14,17,23,0.80) 40%,
        rgba(14,17,23,0.88) 100%
      );
    }

    /* ─── Particle Canvas ────────────────────────────────────── */
    #particles {
      position: fixed; inset: 0; z-index: 1;
      opacity: 0.45;
      pointer-events: none;
    }

    /* ─── Top Nav ────────────────────────────────────────────── */
    #topnav {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--nav-h);
      z-index: 100;
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      background: rgba(14, 17, 23, 0.70);
      border-bottom: 1px solid var(--panel-border);
      display: flex; align-items: center;
      padding: 0 28px;
      gap: 20px;
    }

    .nav-brand {
      font-family: var(--mono);
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      background: linear-gradient(90deg, #fff 30%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .nav-categories {
      display: flex; align-items: center; gap: 8px;
      flex: 1; justify-content: center;
    }

    .nav-pill {
      font-family: var(--mono);
      font-size: 0.78rem;
      font-weight: 500;
      padding: 6px 16px;
      border-radius: 999px;
      border: 1px solid var(--panel-border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.25s var(--ease);
      white-space: nowrap;
    }
    .nav-pill:hover { color: var(--text); background: var(--accent-dim); border-color: var(--accent); }
    .nav-pill.active { color: #fff; background: var(--accent); border-color: var(--accent); }

    .nav-cta {
      font-family: var(--mono);
      font-size: 0.78rem;
      font-weight: 600;
      padding: 8px 20px;
      border-radius: 999px;
      border: 2px solid #fff;
      background: #fff;
      color: var(--bg);
      cursor: pointer;
      transition: all 0.25s var(--ease);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .nav-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(88,166,255,0.45);
    }

    /* ─── Layout ─────────────────────────────────────────────── */
    #layout {
      position: relative; z-index: 10;
      display: flex;
      padding-top: var(--nav-h);
      min-height: 100vh;
    }

    /* ─── Sidebar ────────────────────────────────────────────── */
    #sidebar {
      position: sticky;
      top: var(--nav-h);
      width: var(--sidebar-w);
      flex-shrink: 0;
      height: calc(100vh - var(--nav-h));
      overflow-y: auto;
      backdrop-filter: blur(6px) saturate(150%);
      -webkit-backdrop-filter: blur(6px) saturate(150%);
      background: var(--sidebar-bg);
      border-right: 1px solid var(--panel-border);
      padding: 24px 16px 32px;
      border-radius: 0 var(--radius) var(--radius) 0;
    }

    .toc-title {
      font-family: var(--mono);
      font-size: 0.70rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--panel-border);
    }

    .toc-list { list-style: none; }
    .toc-list li { margin-bottom: 2px; }

    .toc-link {
      display: block;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      text-decoration: none;
      padding: 5px 10px;
      border-radius: 6px;
      transition: all 0.2s var(--ease);
      line-height: 1.5;
      border-left: 2px solid transparent;
    }
    .toc-link:hover { color: var(--text); background: var(--accent-dim); border-left-color: var(--accent); }
    .toc-link.active { color: var(--accent); background: var(--accent-dim); border-left-color: var(--accent); font-weight: 600; }

    .toc-link.lvl-h2 { padding-left: 10px; }
    .toc-link.lvl-h3 { padding-left: 22px; font-size: 0.72rem; }
    .toc-link.lvl-h4 { padding-left: 34px; font-size: 0.69rem; color: rgba(139,148,158,0.7); }

    /* ─── Main Content ───────────────────────────────────────── */
    #main {
      flex: 1;
      padding: 36px 40px 80px 40px;
      max-width: 1160px;
      margin: 0 auto;
      min-width: 0;
    }

    /* ─── Remove Prism line-numbers white divider ────────────── */
    .line-numbers .line-numbers-rows {
      border-right: none !important;
    }
    /* Also strip the left padding Prism adds for the gutter */
    pre.line-numbers {
      padding-left: 1em !important;
    }

    /* ─── Note Panel ─────────────────────────────────────────── */
    .idx-panel {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      backdrop-filter: blur(6px) saturate(130%);
      -webkit-backdrop-filter: blur(6px) saturate(130%);
      box-shadow: 0 4px 32px rgba(0,0,0,0.35);
      padding: 28px 32px;
      margin-bottom: 24px;
      animation: fadeInUp 0.25s var(--ease) both;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Typography ─────────────────────────────────────────── */
    .md-body h1 {
      font-family: var(--mono);
      font-size: 1.75rem;
      font-weight: 700;
      color: #fff;
      margin: 0 0 20px;
      line-height: 1.3;
    }

    .md-body h2 {
      font-family: var(--mono);
      font-size: 1.25rem;
      font-weight: 700;
      color: #fff;
      margin: 32px 0 12px;
      padding-bottom: 8px;
      border-bottom: 1px dashed rgba(240,246,252,0.20);
      line-height: 1.4;
    }

    .md-body h3 {
      font-family: var(--mono);
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--accent);
      margin: 24px 0 10px;
    }

    .md-body h4 {
      font-family: var(--mono);
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--warning);
      margin: 16px 0 8px;
    }

    .md-body p {
      font-size: 0.93rem;
      line-height: 1.85;
      margin-bottom: 12px;
    }

    .md-body ul, .md-body ol {
      padding-left: 20px;
      margin-bottom: 12px;
    }
    .md-body li {
      font-size: 0.91rem;
      line-height: 1.8;
      margin-bottom: 3px;
    }

    .md-body a {
      color: var(--accent);
      text-decoration: underline dashed;
      text-underline-offset: 3px;
      transition: color 0.2s var(--ease), text-decoration 0.2s;
    }
    .md-body a:hover {
      color: #fff;
      text-decoration: underline solid;
    }

    .md-body strong { color: #e6edf3; font-weight: 600; }
    .md-body em { color: var(--muted); font-style: italic; }

    /* inline code */
    .md-body :not(pre) > code {
      font-family: var(--mono);
      font-size: 0.82rem;
      color: var(--danger);
    }

    /* blockquote */
    .md-body blockquote {
      border-left: 4px solid var(--accent);
      background: rgba(88,166,255,0.07);
      padding: 12px 18px;
      margin: 16px 0;
      border-radius: 0 8px 8px 0;
      color: var(--muted);
      font-style: italic;
    }

    /* hr */
    .md-body hr {
      border: none;
      border-top: 1px dashed rgba(240,246,252,0.15);
      margin: 28px 0;
    }

    /* tables */
    .md-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 0.88rem;
      border-radius: 8px;
      overflow: hidden;
    }
    .md-body th {
      background: rgba(88,166,255,0.18);
      color: var(--accent);
      font-family: var(--mono);
      font-weight: 600;
      padding: 10px 14px;
      text-align: left;
      border-bottom: 1px solid var(--panel-border);
    }
    .md-body td {
      padding: 9px 14px;
      border-bottom: 1px solid rgba(240,246,252,0.06);
      transition: background 0.2s var(--ease);
    }
    .md-body tr:hover td { background: rgba(88,166,255,0.06); }

    /* images */
    .md-body img {
      max-width: 100%;
      border-radius: 8px;
      transition: transform 0.3s var(--ease), box-shadow 0.3s var(--ease);
    }
    .md-body img:hover {
      transform: scale(1.02);
      box-shadow: 0 0 0 3px var(--accent), 0 8px 32px rgba(88,166,255,0.25);
    }

    /* ─── Code Blocks ────────────────────────────────────────── */
    .code-wrapper {
      position: relative;
      margin: 16px 0;
      border-radius: 10px;
      overflow: hidden;
      background: #0d1117;
      border: 1px solid rgba(240,246,252,0.10);
    }

    .code-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 14px;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(240,246,252,0.08);
    }

    .lang-badge {
      font-family: var(--mono);
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(88,166,255,0.12);
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid rgba(88,166,255,0.25);
    }

    .copy-btn {
      font-family: var(--mono);
      font-size: 0.70rem;
      color: var(--muted);
      background: transparent;
      border: 1px solid var(--panel-border);
      padding: 3px 10px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s var(--ease);
    }
    .copy-btn:hover { color: var(--text); border-color: var(--accent); }
    .copy-btn.copied { color: var(--success); border-color: var(--success); }

    .code-wrapper pre {
      margin: 0 !important;
      border-radius: 0 !important;
      background: #0d1117 !important;
      padding: 16px !important;
      overflow-x: auto;
      font-size: 0.82rem !important;
      line-height: 1.7 !important;
    }

    .code-wrapper code {
      font-family: var(--mono) !important;
      font-size: inherit !important;
    }

    /* ─── Prism Syntax Highlighting Overrides ─── */
    .code-wrapper .token.comment {
      color: #56d364 !important; /* success green */
      font-style: italic;
    }
    .code-wrapper .token.comment.filename-comment {
      color: #ff00ff !important; /* Magenta 洋紅色 */
      font-style: normal;
      font-weight: 600;
    }
    .code-wrapper .token.keyword {
      color: #ff7b72 !important; /* soft red */
      font-weight: 600;
    }
    .code-wrapper .token.function {
      color: #d2a8ff !important; /* light purple */
    }
    .code-wrapper .token.class-name,
    .code-wrapper .token.decorator {
      color: #ffa657 !important; /* orange */
      font-weight: 600;
    }
    .code-wrapper .token.string {
      color: #a5d6ff !important; /* light blue */
    }
    .code-wrapper .token.number,
    .code-wrapper .token.boolean {
      color: #79c0ff !important; /* bright blue */
    }
    .code-wrapper .token.operator {
      color: #ff7b72 !important;
    }
    .code-wrapper .token.builtin {
      color: #79c0ff !important;
    }
    .code-wrapper .token.variable,
    .code-wrapper .token.parameter {
      color: #e5c07b !important; /* yellowish orange */
    }
    .code-wrapper .token.punctuation {
      color: #999 !important;
    }

    /* ─── Emoji section markers ──────────────────────────────── */
    .milestone-tag {
      display: inline-block;
      font-size: 0.92rem;
      font-family: var(--mono);
      font-weight: 600;
      color: var(--success);
      margin: 8px 0 4px;
    }

    /* ─── Page Header / Hero ─────────────────────────────────── */
    .page-hero {
      margin-bottom: 32px;
      padding: 36px 36px 28px;
      background: linear-gradient(135deg, rgba(33,38,45,0.55), rgba(22,26,34,0.45));
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 4px 48px rgba(0,0,0,0.4);
    }

    .hero-tag {
      font-family: var(--mono);
      font-size: 0.70rem;
      color: var(--accent);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .hero-title {
      font-family: var(--mono);
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff 40%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }

    .hero-desc {
      font-size: 0.9rem;
      color: var(--muted);
      max-width: 540px;
    }

    .hero-badges {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-top: 16px;
    }

    .badge {
      font-family: var(--mono);
      font-size: 0.70rem;
      padding: 4px 12px;
      border-radius: 999px;
      border: 1px solid var(--panel-border);
      color: var(--muted);
    }
    .badge.py  { color: var(--warning); border-color: rgba(227,179,65,0.35); background: rgba(227,179,65,0.08); }
    .badge.pg  { color: #00B4D8;        border-color: rgba(0,180,216,0.35);  background: rgba(0,180,216,0.08); }
    .badge.gm  { color: var(--success); border-color: rgba(86,211,100,0.35); background: rgba(86,211,100,0.08); }

    /* ─── Footer ─────────────────────────────────────────────── */
    #footer {
      position: relative; z-index: 10;
      text-align: center;
      padding: 28px;
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
      border-top: 1px solid var(--panel-border);
    }
  </style>
</head>

<!-- Background -->
<div id="bg-wrap"></div>
<canvas id="particles"></canvas>

<!-- ─── Top Nav ───────────────────────────────────── -->
<nav id="topnav" role="navigation" aria-label="主選單">
  <span class="nav-brand">☁ Cloudy Notes</span>

  <div class="nav-categories" id="nav-categories-container">
    <!-- populated dynamically by JS -->
  </div>

  <div style="display: flex; gap: 10px; align-items: center;">
    <label class="nav-pill" style="cursor: pointer; display: none; align-items: center; gap: 5px; margin: 0; background: rgba(88, 166, 255, 0.15); border-color: var(--accent); color: #fff;">
      📂 選擇 MD
      <input type="file" id="md-file-input" accept=".md" style="display: none;">

    <button class="nav-cta" onclick="scrollToTop()">↑ 回頂部</button>

</nav>

<!-- ─── Layout ────────────────────────────────────── -->
<div id="layout">

  <!-- Sidebar TOC -->
  <aside id="sidebar" aria-label="目錄">
    <div class="toc-title">📋 目錄 Contents</div>
    <ul class="toc-list" id="toc-list">
      <!-- populated by JS -->
    </ul>
  </aside>

  <!-- Main content -->
  <main id="main" role="main">

    <!-- Hero -->
    <div class="page-hero">
      <div class="hero-tag" id="hero-tag-text">// learning notes · reader</div>
      <h1 class="hero-title">Cloudy Notes</h1>
      <p class="hero-desc" id="hero-desc-text">以極致質感程式員風格展示與管理您的 Markdown 筆記。</p>
      <div class="hero-badges" id="hero-badges-container">
        <!-- badges updated dynamically -->
      </div>
    </div>

    <!-- Content root for dynamic parsing -->
    <div id="content-container">
      <div id="drop-zone" class="idx-panel md-body" style="text-align: center; padding: 60px 20px; border: 2px dashed rgba(88, 166, 255, 0.4); margin-bottom: 24px;">
        <h2 style="border: none; margin-bottom: 10px; font-family: var(--mono); color: #fff;">📂 尚未載入筆記</h2>
        <p style="color: var(--muted); margin-bottom: 20px;">將您的 Markdown (.md) 檔案拖曳至此處，或點擊選擇本機的 .md 筆記檔案。</p>
        <button class="nav-cta" onclick="document.getElementById('md-file-input').click()" style="box-shadow: none;">選擇檔案</button>
      </div>
      <div id="dynamic-content"></div>
    </div>

  </main>
</div>

<!-- Footer -->
<footer id="footer">
  <span>No AI generated content &nbsp;·&nbsp; HTML Template made by Gemini 3.5</span>
</footer>

<!-- Prism.js -->
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/line-numbers/prism-line-numbers.min.js"></script>

<script>
/* ─── Particle Network ───────────────────────────────────── */
(function () {
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let W, H, nodes = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', () => { resize(); init(); });

  function rand(min, max) { return Math.random() * (max - min) + min; }

  function init() {
    nodes = [];
    const count = Math.floor((W * H) / 14000);
    for (let i = 0; i < count; i++) {
      nodes.push({
        x: rand(0, W), y: rand(0, H),
        vx: rand(-0.3, 0.3), vy: rand(-0.3, 0.3),
        r: rand(1.5, 3)
      });
    }
  }
  init();

  const LINK_DIST = 130;
  const NODE_COLOR = 'rgba(88,166,255,0.7)';
  const LINE_COLOR = 'rgba(88,166,255,';

  function draw() {
    ctx.clearRect(0, 0, W, H);
    // move
    nodes.forEach(n => {
      n.x += n.vx; n.y += n.vy;
      if (n.x < 0) n.x = W; if (n.x > W) n.x = 0;
      if (n.y < 0) n.y = H; if (n.y > H) n.y = 0;
    });
    // links
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const dx = nodes[i].x - nodes[j].x;
        const dy = nodes[i].y - nodes[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < LINK_DIST) {
          const alpha = (1 - dist / LINK_DIST) * 0.45;
          ctx.beginPath();
          ctx.strokeStyle = LINE_COLOR + alpha + ')';
          ctx.lineWidth = 0.8;
          ctx.moveTo(nodes[i].x, nodes[i].y);
          ctx.lineTo(nodes[j].x, nodes[j].y);
          ctx.stroke();
        }
      }
    }
    // dots
    nodes.forEach(n => {
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
      ctx.fillStyle = NODE_COLOR;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ─── Copy to Clipboard Function ────────────────────────── */
function copyCode(btn) {
  const pre = btn.closest('.code-wrapper').querySelector('pre');
  const code = pre.textContent;
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Copy';
      btn.classList.remove('copied');
    }, 2000);
  }).catch(err => {
    console.error('Failed to copy text: ', err);
  });
}

/* ─── Custom Marked.js Renderer ─────────────────────────── */
if (typeof marked !== 'undefined') {
  const renderer = new marked.Renderer();
  
  // Custom code block wrapper matching our visual style
  renderer.code = function(codeOrObj, language) {
    let code = codeOrObj;
    let lang = language;
    
    // Check if marked.js passed an object (modern v5+ signature)
    if (typeof codeOrObj === 'object' && codeOrObj !== null) {
      code = codeOrObj.text;
      lang = codeOrObj.lang;
    }
    
    lang = lang || 'python';
    // Clean up python= / js= formats
    lang = lang.replace('=', '');
    
    // Attempt to extract python / js filename comments
    let filename = '';
    const trimmedCode = code ? code.trim() : '';
    const firstLine = trimmedCode.split('\n')[0];
    const fileRegex = /^(?:#|\/\/)\s*([\w.-]+\.[a-zA-Z0-9]+)\s*$/;
    const match = firstLine ? firstLine.match(fileRegex) : null;
    if (match) {
      filename = match[1];
    }
    
    const displayLang = lang || 'python';
    const badgeText = filename ? `${displayLang} · ${filename}` : displayLang;
    
    return `
      <div class="code-wrapper">
        <div class="code-header">
          <span class="lang-badge">${badgeText}</span>
          <button class="copy-btn" onclick="copyCode(this)">Copy</button>
        </div>
        <pre class="line-numbers"><code class="language-python">${code}</code></pre>
      </div>
    `;
  };
  
  marked.setOptions({ renderer: renderer });
}

/* ─── TOC Builder (Dynamic) ────────────────────────────── */
function buildTOC() {
  const tocList = document.getElementById('toc-list');
  tocList.innerHTML = '';
  const headings = document.querySelectorAll('#dynamic-content h2, #dynamic-content h3, #dynamic-content h4');

  headings.forEach((h, idx) => {
    if (!h.id) {
      h.id = `heading-${idx}`;
    }
    const li = document.createElement('li');
    const a  = document.createElement('a');
    a.href = '#' + h.id;
    // Strip styling tags inside text if any
    a.textContent = h.textContent.replace(/🌟/g, '').trim();
    a.className = 'toc-link lvl-' + h.tagName.toLowerCase();
    a.addEventListener('click', e => {
      e.preventDefault();
      h.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    li.appendChild(a);
    tocList.appendChild(li);
  });
}

/* ─── Active TOC Highlight & Scroll Animation ────────────── */
let headingObserver = null;
let animationObserver = null;

function initObservers() {
  // TOC highlight
  const links = document.querySelectorAll('.toc-link');
  if (headingObserver) headingObserver.disconnect();
  
  headingObserver = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        links.forEach(l => l.classList.remove('active'));
        const active = document.querySelector(`.toc-link[href="#${e.target.id}"]`);
        if (active) active.classList.add('active');
      }
    });
  }, { rootMargin: '-20% 0px -70% 0px', threshold: 0 });

  document.querySelectorAll('#dynamic-content h2, #dynamic-content h3').forEach(h => {
    headingObserver.observe(h);
  });

  // Scroll entry animation for panels
  const panels = document.querySelectorAll('.idx-panel');
  if (animationObserver) animationObserver.disconnect();
  
  animationObserver = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.style.animationPlayState = 'running';
        animationObserver.unobserve(e.target);
      }
    });
  }, { threshold: 0 });
  
  panels.forEach(p => {
    p.style.animationPlayState = 'paused';
    animationObserver.observe(p);
  });
}

/* ─── Dynamic Section Segmenter & Category Generator ─────── */
function renderMarkdown(markdownText, fileName = "") {
  let title = '';
  let content = markdownText.trim();
  
  // Parse frontmatter
  const frontmatterRegex = /^---\r?\n([\s\S]*?)\r?\n---\r?\n/;
  const fmMatch = content.match(frontmatterRegex);
  if (fmMatch) {
    const fmText = fmMatch[1];
    const titleMatch = fmText.match(/^title:\s*(.*)$/m);
    if (titleMatch) {
      title = titleMatch[1].trim();
    }
    content = content.replace(frontmatterRegex, '');
  }
  
  // Remove [TOC]
  content = content.replace(/\[TOC\]/gi, '');

  // Pre-process raw markdown to tag milestone lines (e.g. 🌟 ... 🌟)
  const preprocessed = content.replace(/(🌟[^🌟\n]+🌟)/g, '<span class="milestone-tag">$1</span>');
  
  const rawHtml = marked.parse(preprocessed);
  
  const tempDiv = document.createElement('div');
  tempDiv.innerHTML = rawHtml;
  
  const mainContent = document.getElementById('dynamic-content');
  mainContent.innerHTML = '';
  
  const navContainer = document.getElementById('nav-categories-container');
  navContainer.innerHTML = '';
  
  // Hide drop zone
  const dropZone = document.getElementById('drop-zone');
  if (dropZone) dropZone.style.display = 'none';
  
  let sectionIndex = 0;
  let currentSection = null;
  
  function createNewSection(title, id) {
    sectionIndex++;
    const secId = id || `section-${sectionIndex}`;
    
    const newSection = document.createElement('section');
    newSection.setAttribute('data-section', secId);
    newSection.className = 'idx-panel md-body';
    mainContent.appendChild(newSection);
    currentSection = newSection;
    
    // Add Nav category pill
    const pill = document.createElement('button');
    pill.className = 'nav-pill' + (sectionIndex === 1 ? ' active' : '');
    pill.setAttribute('data-section', secId);
    pill.textContent = title;
    pill.addEventListener('click', () => {
      document.querySelectorAll('.nav-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      newSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    navContainer.appendChild(pill);
  }
  
  // Segment elements by H2 tags
  Array.from(tempDiv.children).forEach(child => {
    if (child.tagName === 'H2') {
      const title = child.textContent.replace(/🌟/g, '').trim();
      const id = child.id || `h-${sectionIndex}`;
      createNewSection(title, id);
      currentSection.appendChild(child);
    } else {
      if (!currentSection) {
        createNewSection('概覽', 'overview');
      }
      currentSection.appendChild(child);
    }
  });
  
  // Update Hero section text details
  document.querySelector('.hero-title').textContent = '中山資工營pygame專案 《Cloudy Adventure》教學';
  document.getElementById('hero-tag-text').textContent = '// pygame · Python 3';
  document.getElementById('hero-desc-text').textContent = '';
  
  // Dynamically set category badges in hero
  const badgesContainer = document.getElementById('hero-badges-container');
  badgesContainer.innerHTML = '';
  
  // Scan for keywords to append visual badges
  const codeText = markdownText.toLowerCase();
  const badges = [];
  if (codeText.includes('pygame')) badges.push({ text: 'pygame', class: 'pg' });
  if (codeText.includes('python')) badges.push({ text: 'Python 3', class: 'py' });
  if (codeText.includes('sprite')) badges.push({ text: 'Sprite Groups', class: '' });
  if (codeText.includes('class') || codeText.includes('def')) badges.push({ text: 'OOP', class: '' });
  
  badges.forEach(b => {
    const span = document.createElement('span');
    span.className = 'badge' + (b.class ? ` ${b.class}` : '');
    span.textContent = b.text;
    badgesContainer.appendChild(span);
  });
  
  // Highlight plain text filenames ending in .py in danger/highlight red
  highlightFilenames(mainContent);
  
  // Re-build TOC & observe headings
  buildTOC();
  initObservers();
  
  // Trigger Prism highlights
  if (typeof Prism !== 'undefined') {
    Prism.highlightAll();
    colorFilenameComments();
  }
}

/* ─── Post-processor to highlight .py file names in red ─── */
function highlightFilenames(rootElement) {
  const walk = document.createTreeWalker(
    rootElement,
    NodeFilter.SHOW_TEXT,
    {
      acceptNode: function(node) {
        // Skip text nodes inside code blocks, badges, or existing code tags
        let parent = node.parentNode;
        while (parent && parent !== rootElement) {
          if (parent.tagName === 'PRE' || parent.tagName === 'CODE' || parent.classList.contains('lang-badge')) {
            return NodeFilter.FILTER_REJECT;
          }
          parent = parent.parentNode;
        }
        return NodeFilter.FILTER_ACCEPT;
      }
    }
  );

  const textNodes = [];
  let currentNode;
  while (currentNode = walk.nextNode()) {
    textNodes.push(currentNode);
  }

  // Regex to match filename.py (e.g. Settings.py, Player.py, main.py)
  const fileRegex = /\b([\w-]+\.py)\b/g;

  textNodes.forEach(node => {
    const text = node.nodeValue;
    if (fileRegex.test(text)) {
      fileRegex.lastIndex = 0; // reset
      const tempSpan = document.createElement('span');
      // Style using var(--danger) which is soft red (#FF7B72)
      tempSpan.innerHTML = text.replace(fileRegex, '<code style="color: var(--danger); font-family: var(--mono); font-size: 0.88rem; background: transparent; border: none; padding: 0 2px;">$1</code>');
      
      const parent = node.parentNode;
      while (tempSpan.firstChild) {
        parent.insertBefore(tempSpan.firstChild, node);
      }
      parent.removeChild(node);
    }
  });
}

/* ─── Post-processor to highlight filename comments in magenta ─── */
function colorFilenameComments() {
  const codeBlocks = document.querySelectorAll('.code-wrapper code');
  const fileRegex = /^(?:#|\/\/)\s*([\w.-]+\.[a-zA-Z0-9]+)\s*$/;
  codeBlocks.forEach(codeEl => {
    const comments = codeEl.querySelectorAll('.token.comment');
    if (comments.length > 0) {
      const firstComment = comments[0];
      const text = firstComment.textContent.trim();
      if (fileRegex.test(text)) {
        // Double check it's at the very start of the code text
        const codeText = codeEl.textContent.trim();
        if (codeText.startsWith(firstComment.textContent.trim())) {
          firstComment.classList.add('filename-comment');
        }
      }
    }
  });
}

/* ─── File Load Handlers ────────────────────────────────── */
const fileInput = document.getElementById('md-file-input');

fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = evt => {
      renderMarkdown(evt.target.result, file.name);
    };
    reader.readAsText(file);
  }
});

// Drag and drop events on body
window.addEventListener('dragover', e => {
  e.preventDefault();
}, false);

window.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file && file.name.endsWith('.md')) {
    const reader = new FileReader();
    reader.onload = evt => {
      renderMarkdown(evt.target.result, file.name);
    };
    reader.readAsText(file);
  }
}, false);

// Auto-fetch default files on launch
window.addEventListener('DOMContentLoaded', () => {
  const filesToTry = [
    'Cloudy Adeventure Document.md'
  ];

  function tryFetch(index) {
    if (index >= filesToTry.length) {
      // All fetches failed — likely opened via file:// protocol
      const mainContent = document.getElementById('main-content');
      if (mainContent) {
        mainContent.innerHTML = `
          <div style="text-align:center; padding: 80px 20px; color: var(--muted);">
            <div style="font-size: 3rem; margin-bottom: 16px;">📂</div>
            <h2 style="color: var(--text); margin-bottom: 12px;">請透過本機伺服器開啟</h2>
            <p style="margin-bottom: 24px;">在 <code>file://</code> 協定下，瀏覽器安全限制無法讀取本機檔案。</p>
            <p>請在此資料夾執行：</p>
            <pre style="display:inline-block; background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 8px; padding: 12px 24px; margin: 16px 0; font-family: var(--mono); font-size: 1rem;">python -m http.server 8000</pre>
            <p>再用瀏覽器開啟：<a href="http://localhost:8000" style="color: var(--accent);">http://localhost:8000</a></p>
          </div>
        `;
      }
      return;
    }
    const currentFile = filesToTry[index];
    fetch(currentFile)
      .then(res => {
        if (!res.ok) throw new Error('Not found');
        return res.text();
      })
      .then(text => {
        renderMarkdown(text, currentFile);
      })
      .catch(() => {
        tryFetch(index + 1);
      });
  }

  tryFetch(0);
});
</script>
